[build]
builder = "nixpacks"
buildCommand = "export NODE_OPTIONS=--max-old-space-size=2048 && npm install --legacy-peer-deps && cd apps/backend && npm install --legacy-peer-deps && npm run build"

[deploy]
startCommand = "cd /app/apps/backend && npx medusa db:migrate && npm run start"
restartPolicyType = "on_failure"
